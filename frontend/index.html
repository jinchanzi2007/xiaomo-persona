<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小阳的大学属性面板</title>
    <style>
        /* ==================== 1. 全局与背景设计 ==================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* 你的专属精美壁纸 */
            background: url('erciyuan.avif') no-repeat center center;
            background-size: cover;
            position: relative;
        }

        /* 背景轻微暗化遮罩，如果觉得太暗可以删掉这里 */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.15); /* 透明度调低到了 15%，让原图更清晰 */
            z-index: 0;
        }

        /* ==================== 2. 毛玻璃核心大画板 ==================== */
        .main-board {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 1100px;
            height: 85vh; /* 稍微加高了一点点，容纳更多内容 */
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            padding: 30px;
            color: #ffffff;
        }

        .board-title {
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffffff, #ffd1f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .content-layout {
            flex: 1;
            display: flex;
            gap: 30px;
            overflow: hidden;
        }

        /* 左栏：输入区域 + 历史足迹 */
        .column-left {
            flex: 1.1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow: hidden;
        }

        /* 右栏：状态与旁白展示区域 */
        .column-right {
            flex: 0.9;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ==================== 3. 内部玻璃微型卡片 ==================== */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 24px;
            box-shadow: inset 0 0 12px rgba(255, 255, 255, 0.05);
        }

        .card-subtitle {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 18px;
            color: #fff;
            border-left: 4px solid #ff6ebb;
            padding-left: 10px;
        }

        /* 输入框样式 */
        .custom-textarea {
            width: 100%;
            height: 100px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            font-size: 15px;
            resize: none;
            outline: none;
            transition: all 0.3s;
        }

        .custom-textarea:focus {
            background: rgba(255, 255, 255, 0.22);
            border-color: #ff6ebb;
            box-shadow: 0 0 15px rgba(255, 110, 187, 0.4);
        }

        .btn-group { display: flex; gap: 15px; }

        .action-btn {
            flex: 1;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-clear {
            background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-clear:hover { background: rgba(255,255,255,0.25); }

        .btn-submit {
            background: linear-gradient(135deg, #ff6ebb, #3a86ff);
            box-shadow: 0 4px 15px rgba(255, 110, 187, 0.4);
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 110, 187, 0.6);
        }

        /* ==================== 4. 新增：历史足迹滚动区样式 ==================== */
        .history-container {
            flex: 1; /* 占据左侧剩余的所有空间 */
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 8px; /* 给滚动条留点空间 */
        }

        /* 隐藏原始滚动条，定制玻璃风滚动条 */
        .history-container::-webkit-scrollbar { width: 6px; }
        .history-container::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
        .history-container::-webkit-scrollbar-thumb { background: rgba(255,110,187,0.5); border-radius: 4px; }

        /* 单条日志的样式 */
        .log-item {
            background: rgba(0, 0, 0, 0.2);
            border-left: 3px solid #ff6ebb;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            animation: fadeIn 0.5s ease-out; /* 弹入动画 */
        }

        .log-time {
            color: #cbd5e1;
            font-size: 11px;
            margin-bottom: 4px;
        }

        .log-text {
            color: #f8fafc;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .log-stats {
            display: flex;
            gap: 12px;
            font-size: 12px;
            font-weight: bold;
        }

        .empty-hint {
            text-align: center;
            color: #cbd5e1;
            font-style: italic;
            margin-top: 30px;
        }
