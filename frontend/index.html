<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小阳的大学属性面板</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <style>
        /* ==================== 1. 全局与背景设计 ==================== */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        body { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; background: url('erciyuan.avif') no-repeat center center; background-size: cover; position: relative; }
        body::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.15); z-index: 0; }

        /* ==================== 2. 毛玻璃核心大画板 ==================== */
        .main-board { position: relative; z-index: 1; width: 90%; max-width: 1150px; height: 85vh; background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.25); border-radius: 24px; box-shadow: 0 16px 48px rgba(0, 0, 0, 0.3); display: flex; flex-direction: column; padding: 30px; color: #ffffff; }
        .board-title { text-align: center; font-size: 26px; font-weight: 700; letter-spacing: 2px; background: linear-gradient(135deg, #ffffff, #ffd1f0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 25px; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        .content-layout { flex: 1; display: flex; gap: 30px; overflow: hidden; }
        .column-left { flex: 1.1; display: flex; flex-direction: column; gap: 20px; overflow: hidden; }
        .column-right { flex: 0.9; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; padding-right: 5px; }
        .column-right::-webkit-scrollbar { width: 0px; }

        /* ==================== 3. 内部玻璃卡片与输入区 ==================== */
        .glass-card { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 16px; padding: 24px; box-shadow: inset 0 0 12px rgba(255, 255, 255, 0.05); }
        .card-subtitle { font-size: 18px; font-weight: 600; margin-bottom: 18px; color: #fff; border-left: 4px solid #ff6ebb; padding-left: 10px; }
        .custom-textarea { width: 100%; height: 90px; background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; padding: 15px; color: #fff; font-size: 15px; resize: none; outline: none; transition: all 0.3s; }
        .custom-textarea:focus { background: rgba(255, 255, 255, 0.22); border-color: #ff6ebb; box-shadow: 0 0 15px rgba(255, 110, 187, 0.4); }
        .btn-group { display: flex; gap: 15px; margin-top: 15px; }
        .action-btn { flex: 1; border: none; padding: 12px; border-radius: 12px; font-size: 16px; font-weight: 600; color: white; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-clear { background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05)); border: 1px solid rgba(255,255,255,0.2); }
        .btn-clear:hover { background: rgba(255,255,255,0.25); }
        .btn-submit { background: linear-gradient(135deg, #ff6ebb, #3a86ff); box-shadow: 0 4px 15px rgba(255, 110, 187, 0.4); }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 110, 187, 0.6); }

        /* ==================== 4. 历史足迹滚动区样式 ==================== */
        .history-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-right: 8px; }
        .history-container::-webkit-scrollbar { width: 6px; }
        .history-container::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
        .history-container::-webkit-scrollbar-thumb { background: rgba(255,110,187,0.5); border-radius: 4px; }
        .log-item { background: rgba(0, 0, 0, 0.2); border-left: 3px solid #ff6ebb; padding: 12px; border-radius: 8px; font-size: 13px; animation: fadeIn 0.5s ease-out; }
        .log-time { color: #cbd5e1; font-size: 11px; margin-bottom: 4px; }
        .log-text { color: #f8fafc; margin-bottom: 8px; line-height: 1.4; }
        .log-stats { display: flex; flex-wrap: wrap; gap: 10px; font-size: 12px; font-weight: bold; }
        .empty-hint { text-align: center; color: #cbd5e1; font-style: italic; margin-top: 30px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* ==================== 5. RPG 角色信息区 & 头像上传 ==================== */
        .profile-header { display: flex; align-items: center; gap: 18px; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px dashed rgba(255,255,255,0.2); }
        .avatar-wrapper { position: relative; width: 65px; height: 65px; border-radius: 50%; cursor: pointer; overflow: hidden; border: 3px solid #ff6ebb; box-shadow: 0 0 15px rgba(255, 110, 187, 0.5); }
        .avatar { width: 100%; height: 100%; object-fit: cover; background: rgba(255,255,255,0.2); transition: 0.3s; }
        .avatar-hover-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); color: white; display: flex; justify-content: center; align-items: center; font-size: 12px; font-weight: bold; opacity: 0; transition: 0.3s; }
        .avatar-wrapper:hover .avatar-hover-overlay { opacity: 1; }
        .avatar-wrapper:hover .avatar { transform: scale(1.1); }
        .profile-info { display: flex; flex-direction: column; gap: 6px; }
        .player-name { font-size: 18px; font-weight: bold; color: #fff; }
        .title-badge { background: linear-gradient(90deg, #ff6ebb, #a29bfe); padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; color: white; display: inline-block; width: fit-content; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }

        /* ==================== 6. 高阶状态条与数值 ==================== */
        .status-item { margin-bottom: 18px; }
        .status-info { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; align-items: center; }
        .progress-track { width: 100%; height: 16px; background: rgba(255, 255, 255, 0.15); border-radius: 8px; overflow: hidden; position: relative; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        .progress-fill { height: 100%; width: 50%; border-radius: 8px; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); position: relative; z-index: 1; }
        .progress-text { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 11px; font-weight: bold; color: white; text-shadow: 0 1px 3px rgba(0,0,0,0.8); z-index: 2; letter-spacing: 1px;}
        #stamina-fill { background: linear-gradient(90deg, #10b981, #34d399); }
        #intelligence-fill { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
        #mood-fill { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        #wealth-fill { background: linear-gradient(90deg, #eab308, #fef08a); }
        #charm-fill { background: linear-gradient(90deg, #d946ef, #f5d0fe); }
        .delta-badge { font-weight: bold; font-size: 13px; }
        .pos { color: #34d399; }
        .neg { color: #f87171; }
        .summary-content { font-size: 14px; line-height: 1.6; color: #e2e8f0; font-style: italic; }

        /* ==================== 7. 弹窗样式 ==================== */
        .glass-dialog { border: none; background: rgba(25, 20, 30, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(248, 113, 113, 0.4); border-radius: 20px; padding: 30px; width: 450px; color: white; box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(248, 113, 113, 0.15); margin: auto; }
        .glass-dialog::backdrop { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); }
        .dialog-title { color: #f87171; font-size: 20px; font-weight: bold; margin-bottom: 15px; }
        .dialog-btn { background: linear-gradient(135deg, #f87171, #ef4444); border: none; padding: 10px 20px; color: white; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 15px rgba(248, 113, 113, 0.4);}
        .img-container { width: 100%; height: 350px; background-color: #000; border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
        .img-container img { display: block; max-width: 100%; }
    </style>
</head>
<body>

    <div class="main-board">
        <h1 class="board-title">[-] 大学生生涯状态模拟舱 [-]</h1>
        <div class="content-layout">
            <div class="column-left">
                <div class="glass-card" style="flex: 0 0 auto;">
                    <p class="card-subtitle">[日志] 今日行动日志</p>
                    <textarea id="daily-input" class="custom-textarea" placeholder="在这里写下你今天的经历...例如：今天清晨在操场晨跑了3公里，感觉神清气爽！"></textarea>
                    <div class="btn-group">
                        <button class="action-btn btn-clear" onclick="document.getElementById('daily-input').value=''">清空输入</button>
                        <button class="action-btn btn-submit" id="submit-btn" onclick="submitDiary()">AI 结算属性</button>
                    </div>
                </div>

                <div class="glass-card" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
                    <p class="card-subtitle">[记录] 历史足迹</p>
                    <div id="history-log-container" class="history-container">
                        <div class="empty-hint" id="empty-hint">暂无行动记录，快去开启今天的生活吧！</div>
                    </div>
                </div>
            </div>

            <div class="column-right">
                <div class="glass-card">
                    <div class="profile-header">
                        <div class="avatar-wrapper" onclick="document.getElementById('avatar-upload').click()" title="点击更换头像">
                            <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=xiaoyang&backgroundColor=b6e3f4" alt="头像" class="avatar" id="player-avatar">
                            <div class="avatar-hover-overlay">更换</div>
                        </div>
                        <input type="file" id="avatar-upload" accept="image/*" style="display: none;">
                        
                        <div class="profile-info">
                            <div class="player-name">玩家：小阳</div>
                            <div class="title-badge" id="player-title">LV.1 迷茫大一新生</div>
                        </div>
                    </div>

                    <p class="card-subtitle">[状态] 核心数值面板</p>
                    <div class="status-item"><div class="status-info"><span>体力 (Stamina)</span><span id="stamina-delta" class="delta-badge"></span></div><div class="progress-track"><div class="progress-fill" id="stamina-fill"></div><span class="progress-text" id="stamina-val">70/100</span></div></div>
                    <div class="status-item"><div class="status-info"><span>智力 (Intelligence)</span><span id="intelligence-delta" class="delta-badge"></span></div><div class="progress-track"><div class="progress-fill" id="intelligence-fill"></div><span class="progress-text" id="intelligence-val">50/100</span></div></div>
                    <div class="status-item"><div class="status-info"><span>心情 (Mood)</span><span id="mood-delta" class="delta-badge"></span></div><div class="progress-track"><div class="progress-fill" id="mood-fill"></div><span class="progress-text" id="mood-val">60/100</span></div></div>
                    <div class="status-item"><div class="status-info"><span>财力 (Wealth)</span><span id="wealth-delta" class="delta-badge"></span></div><div class="progress-track"><div class="progress-fill" id="wealth-fill"></div><span class="progress-text" id="wealth-val">40/100</span></div></div>
                    <div class="status-item"><div class="status-info"><span>魅力 (Charm)</span><span id="charm-delta" class="delta-badge"></span></div><div class="progress-track"><div class="progress-fill" id="charm-fill"></div><span class="progress-text" id="charm-val">50/100</span></div></div>
                </div>

                <div class="glass-card" id="summary-box" style="flex: 1; display: none;">
                    <p class="card-subtitle">观测者旁白</p>
                    <p class="summary-content" id="summary-text"></p>
                </div>
            </div>
        </div>
    </div>

    <dialog class="glass-dialog" id="npc-dialog">
        <div class="dialog-title">警告：NPC 乱入！</div>
        <p id="npc-message" style="line-height: 1.6; color: #cbd5e1;"></p>
        <button class="dialog-btn" style="float: right;" onclick="document.getElementById('npc-dialog').close()">知道错了，马上休息</button>
    </dialog>

    <dialog class="glass-dialog" id="crop-dialog" style="width: 550px;">
        <div class="dialog-title" style="color: #a29bfe;">裁剪专属头像</div>
        <div class="img-container">
            <img id="image-to-crop" src="">
        </div>
        <div style="display: flex; justify-content: flex-end; gap: 15px;">
            <button class="dialog-btn" style="background: rgba(255,255,255,0.2); box-shadow: none; margin-top: 0;" onclick="closeCropDialog()">取消</button>
            <button class="dialog-btn" style="background: linear-gradient(135deg, #a29bfe, #ff6ebb); margin-top: 0;" onclick="confirmCrop()">确认更换</button>
        </div>
    </dialog>

    <script>
        let userStats = { stamina: 70, intelligence: 50, mood: 60, wealth: 40, charm: 50 };
        window.onload = () => { renderBars(); };

        async function submitDiary() {
            const input = document.getElementById('daily-input').value;
            if(!input) { alert("同学，你今天总不能什么都没干吧？写点什么！"); return; }
            const btn = document.getElementById('submit-btn'); btn.innerText = "大模型沉思中..."; btn.disabled = true;

            try {
                const response = await fetch('https://xiaomo-persona.onrender.com/api/settle', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({text: input})
                });
                const data = await response.json();
                
                let w_delta = 0, c_delta = 0;
                if(input.includes("买") || input.includes("外卖") || input.includes("钱") || input.includes("游戏")) { w_delta = -Math.floor(Math.random() * 10 + 5); } 
                else if(input.includes("兼职") || input.includes("赚钱")) { w_delta = Math.floor(Math.random() * 15 + 10); }

                if(input.includes("洗头") || input.includes("社团") || input.includes("聊天") || input.includes("表白")) { c_delta = Math.floor(Math.random() * 10 + 5); } 
                else if(input.includes("没洗头") || input.includes("熬夜") || input.includes("旷课")) { c_delta = -Math.floor(Math.random() * 8 + 2); }

                updateStat('stamina', data.stamina_delta); updateStat('intelligence', data.intelligence_delta); updateStat('mood', data.mood_delta);
                updateStat('wealth', w_delta); updateStat('charm', c_delta);

                document.getElementById('summary-box').style.display = 'block'; document.getElementById('summary-text').innerText = "“ " + data.summary + " ”";
                addHistoryLog(input, data.stamina_delta, data.intelligence_delta, data.mood_delta, w_delta, c_delta);
                document.getElementById('daily-input').value = ''; checkTitleEvolution();

                if (userStats.mood < 30) {
                    setTimeout(() => { document.getElementById('npc-message').innerText = "辅导员小阳：你看看你的心情值！检测到持续摆烂或内卷，请立刻放下手机去吃顿好的，否则明天将被挂科诅咒！"; document.getElementById('npc-dialog').showModal(); }, 600);
                } else if (userStats.wealth < 10) {
                    setTimeout(() => { document.getElementById('npc-message').innerText = "老妈来电：你生活费怎么见底了？！天天买外卖是吧？下个月扣钱！"; document.getElementById('npc-dialog').showModal(); }, 600);
                }
            } catch (error) {
                console.error(error); alert("请求失败！请检查 Render 云端服务器状态。");
            } finally { btn.innerText = "AI 结算属性"; btn.disabled = false; }
        }

        function addHistoryLog(text, st, int, mo, we, ch) {
            const hint = document.getElementById('empty-hint'); if (hint) hint.style.display = 'none';
            const container = document.getElementById('history-log-container');
            const now = new Date(); const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            const formatDelta = (val, label) => { if (val > 0) return `<span class="pos">${label} +${val}</span>`; if (val < 0) return `<span class="neg">${label} ${val}</span>`; return `<span style="color:#cbd5e1;">${label} +0</span>`; };
            const logHtml = `<div class="log-item"><div class="log-time">[Time] ${timeStr}</div><div class="log-text">${text}</div><div class="log-stats">${formatDelta(st, '体力')} ${formatDelta(int, '智力')} ${formatDelta(mo, '心情')} ${formatDelta(we, '财力')} ${formatDelta(ch, '魅力')}</div></div>`;
            container.insertAdjacentHTML('afterbegin', logHtml);
        }

        function updateStat(key, delta) {
            userStats[key] += delta; userStats[key] = Math.max(0, Math.min(100, userStats[key]));
            let deltaSpan = document.getElementById(key + '-delta');
            if (delta > 0) { deltaSpan.innerText = "+" + delta; deltaSpan.className = "delta-badge pos"; } 
            else if (delta < 0) { deltaSpan.innerText = delta; deltaSpan.className = "delta-badge neg"; } 
            else { deltaSpan.innerText = "+0"; deltaSpan.className = "delta-badge"; }
            renderBars();
        }

        function renderBars() {
            const keys = ['stamina', 'intelligence', 'mood', 'wealth', 'charm'];
            keys.forEach(key => { document.getElementById(key + '-fill').style.width = userStats[key] + '%'; document.getElementById(key + '-val').innerText = userStats[key] + '/100'; });
        }

        function checkTitleEvolution() {
            let titleBox = document.getElementById('player-title');
            if (userStats.intelligence >= 80) { titleBox.innerText = "LV.99 图书馆扫地僧"; titleBox.style.background = "linear-gradient(90deg, #f59e0b, #ef4444)"; } 
            else if (userStats.charm >= 80) { titleBox.innerText = "LV.50 校园交际花"; titleBox.style.background = "linear-gradient(90deg, #d946ef, #a855f7)"; } 
            else if (userStats.stamina <= 20) { titleBox.innerText = "LV.10 脆皮大学生"; titleBox.style.background = "linear-gradient(90deg, #94a3b8, #475569)"; }
        }

        // ==================== 头像上传与裁剪逻辑 ====================
        let cropper;
        const uploadInput = document.getElementById('avatar-upload');
        const cropDialog = document.getElementById('crop-dialog');
        const imageToCrop = document.getElementById('image-to-crop');
        const playerAvatar = document.getElementById('player-avatar');

        uploadInput.addEventListener('change', function (e) {
            const files = e.target.files;
            if (files && files.length > 0) {
                const reader = new FileReader();
                reader.onload = function (event) {
                    imageToCrop.src = event.target.result;
                    cropDialog.showModal();
                    if (cropper) cropper.destroy();
                    cropper = new Cropper(imageToCrop, {
                        aspectRatio: 1,
                        viewMode: 1,
                        dragMode: 'move',
                        guides: true,
                        background: false
                    });
                };
                reader.readAsDataURL(files[0]);
            }
            uploadInput.value = ''; 
        });

        function closeCropDialog() { cropDialog.close(); if (cropper) cropper.destroy(); }
        function confirmCrop() {
            if (!cropper) return;
            const canvas = cropper.getCroppedCanvas({ width: 200, height: 200 });
            playerAvatar.src = canvas.toDataURL('image/png');
            closeCropDialog();
        }
    </script>
</body>
</html>
