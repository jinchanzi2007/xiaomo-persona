<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大学生涯模拟舱 - 探索未知之境</title>
    <style>
        /* ==================== 1. 全局与色彩变量 ==================== */
        :root {
            --bg-dark: #020b14;       /* 极暗深蓝，垫底色 */
            --ganyu: #003C75;         /* 绀宇色 */
            --biluo: #AFD0F2;         /* 碧落色 */
            --text-main: #f8fafc;
            --text-muted: #8fa6b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* 模拟 DeepSeek 的流线光晕背景 (纯CSS实现) */
        .bg-glow {
            position: absolute; top: -20%; left: -10%; width: 120%; height: 120%;
            background: radial-gradient(ellipse at 50% 30%, rgba(0, 60, 117, 0.4) 0%, rgba(2, 11, 20, 0) 60%),
                        radial-gradient(ellipse at 80% 80%, rgba(175, 208, 242, 0.1) 0%, rgba(2, 11, 20, 0) 50%);
            z-index: -1; pointer-events: none;
            filter: blur(60px);
        }

        /* ==================== 2. 顶部导航栏 ==================== */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; position: relative; z-index: 10;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px; color: var(--biluo); letter-spacing: 1px; }
        .logo-icon { width: 24px; height: 24px; background: var(--biluo); border-radius: 50%; box-shadow: 0 0 10px var(--biluo); }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { text-decoration: none; color: var(--text-muted); font-size: 14px; transition: 0.3s; }
        .nav-links a:hover { color: var(--biluo); }

        /* ==================== 3. 核心视觉区 (Hero Section) ==================== */
        .hero {
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 0 20px; z-index: 10; margin-top: -5vh;
        }
        
        .announcement {
            font-size: 13px; color: var(--text-muted); margin-bottom: 30px; padding: 6px 16px;
            background: rgba(175, 208, 242, 0.05); border: 1px solid rgba(175, 208, 242, 0.15); border-radius: 20px;
            letter-spacing: 0.5px;
        }
        .announcement span { color: var(--biluo); }

        .main-title {
            font-size: 64px; font-weight: 800; letter-spacing: 3px; margin-bottom: 15px;
            background: linear-gradient(90deg, #ffffff, var(--biluo));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        
        .sub-title { font-size: 24px; font-weight: 400; color: var(--text-main); margin-bottom: 50px; letter-spacing: 2px; }

        /* ==================== 4. 悬浮双卡片 ==================== */
        .card-container { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
        
        .action-card {
            background: rgba(0, 60, 117, 0.15); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(175, 208, 242, 0.15); border-radius: 20px;
            padding: 35px 40px; width: 340px; text-align: left; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-decoration: none; color: inherit; display: block;
        }
        
        .action-card:hover {
            background: rgba(0, 60, 117, 0.3); border-color: var(--biluo);
            transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(175, 208, 242, 0.15);
        }
        
        .card-title { font-size: 22px; font-weight: 600; color: var(--biluo); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .card-desc { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

        /* ==================== 5. 底部版权区 (Footer) ==================== */
        footer {
            border-top: 1px solid rgba(175, 208, 242, 0.1); padding: 50px 80px 30px;
            display: flex; justify-content: space-between; flex-wrap: wrap; gap: 40px;
            background: rgba(2, 11, 20, 0.8); z-index: 10;
        }
        
        .footer-logo { flex: 1; min-width: 250px; }
        .footer-logo .logo-text { font-size: 20px; font-weight: bold; color: var(--biluo); margin-bottom: 20px; }
        .footer-icons { display: flex; gap: 15px; margin-bottom: 30px; color: var(--text-muted); }
        .footer-icons span { cursor: pointer; transition: 0.3s; }
        .footer-icons span:hover { color: var(--biluo); }
        .copyright { font-size: 12px; color: rgba(143, 166, 184, 0.5); }

        .footer-links { display: flex; gap: 80px; flex-wrap: wrap; }
        .link-column { display: flex; flex-direction: column; gap: 12px; }
        .link-column h4 { font-size: 14px; color: var(--text-main); margin-bottom: 8px; }
        .link-column a { text-decoration: none; color: var(--text-muted); font-size: 13px; transition: 0.3s; }
        .link-column a:hover { color: var(--biluo); }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .main-title { font-size: 48px; }
            .sub-title { font-size: 18px; }
            .card-container { flex-direction: column; align-items: center; }
            .action-card { width: 100%; max-width: 340px; }
            footer { padding: 40px 30px; flex-direction: column; gap: 40px; }
            .footer-links { gap: 40px; justify-content: space-between; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <header>
        <div class="logo-area">
            <div class="logo-icon"></div>
            UNISIM
        </div>
        <div class="nav-links">
            <a href="#">开发文档</a>
            <a href="#">系统日志</a>
            <a href="#">关于项目</a>
        </div>
    </header>

    <main class="hero">
        <div class="announcement">
            🎉 大学生涯状态模拟舱 v1.0 预发布版本上线，<span>点击查看详情</span>。
        </div>
        
        <h1 class="main-title">UNISIM</h1>
        <h2 class="sub-title">演算你的大学轨迹 · 探索未知的可能性</h2>

        <div class="card-container">
            <a href="index.html" class="action-card">
                <div class="card-title">启动模拟舱</div>
                <div class="card-desc">
                    进入高阶交互终端<br>
                    执行今日行动指令，演算多维数据反馈
                </div>
            </a>

            <a href="#" class="action-card">
                <div class="card-title">查阅系统档案</div>
                <div class="card-desc">
                    调用本地持久化数据<br>
                    回顾历史足迹、收集的成就与隐藏羁绊
                </div>
            </a>
        </div>
    </main>

    <footer>
        <div class="footer-logo">
            <div class="logo-text">UNISIM 模拟舱</div>
            <div class="footer-icons">
                <span>✉️</span> <span>💻</span> <span>💬</span>
            </div>
            <div class="copyright">© 2026 个人开发者小阳 版权所有.</div>
        </div>
        
        <div class="footer-links">
            <div class="link-column">
                <h4>核心架构</h4>
                <a href="#">日记解析模型</a>
                <a href="#">状态流转系统</a>
                <a href="#">本地化存储</a>
            </div>
            <div class="link-column">
                <h4>前端组件</h4>
                <a href="#">毛玻璃终端 UI</a>
                <a href="#">交互式进度条</a>
                <a href="#">虚拟场景地图</a>
            </div>
            <div class="link-column">
                <h4>法务与安全</h4>
                <a href="#">隐私协议</a>
                <a href="#">数据留存说明</a>
                <a href="#">免责声明</a>
            </div>
        </div>
    </footer>

</body>
</html>
